name: Collect AIS positions

on:
  schedule:
    - cron: '*/10 * * * *'   # every ~10 min (GitHub's cron floor; may lag under load)
  workflow_dispatch: {}       # manual "Run workflow" button

# Let the run commit positions.json back to the repo.
permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: collector
        run: npm ci || npm install

      - name: Collect positions
        working-directory: collector
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
          COLLECT_SECONDS: '90'
        run: node collect.mjs

      - name: Commit updated positions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet positions.json; then
            git add positions.json
            git commit -m "chore: update positions [skip ci]"
            git push
          else
            echo "No position changes."
          fi
